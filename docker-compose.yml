version: '3.9'

services:
    frontend:
        image: ahmad780/linksnap-frontend:latest
        container_name: linksnap_frontend
        ports:
            - "3000:80"
        depends_on:
            - backend
        networks:
            - linksnap-network
        restart: unless-stopped

    backend:
        image: ahmad780/linksnap-backend:latest
        container_name: linksnap_backend
        ports:
            - "5000:5000"
        environment:
            - POSTGRES_HOST=postgres
            - POSTGRES_PORT=${POSTGRES_PORT}
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            - BASE_URL=${BASE_URL}
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - linksnap-network
        restart: unless-stopped

    postgres:
        image: postgres:17-alpine
        container_name: linksnap_postgres
        environment:
            - POSTGRES_DB=${POSTGRES_DB}
            - POSTGRES_USER=${POSTGRES_USER}
            - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - linksnap-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

volumes:
    postgres_data:

networks:
    linksnap-network:
        driver: bridge